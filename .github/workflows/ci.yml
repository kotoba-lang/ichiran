name: ci

# deps.edn's :dev alias overrides io.github.kotoba-lang/langchain to a sibling
# local checkout (../langchain); deps.edn also references kotoba-lang/sheets
# and kotoba-lang/mailer via :local/root unconditionally (ichiran holds
# sheets.model EDN verbatim, ADR-2607062030; mailer backs the opt-in real
# Resend Distributor, src/ichiran/resend.clj), and mailer's own deps.edn
# pulls kotoba-lang/mail the same way -- so all four siblings are checked out
# here. langgraph/ed25519/ipns resolve via their pinned :git/sha directly
# (public kotoba-lang repos). Until this standalone repo's Actions are
# enabled, the gates also run in the west superproject: `clojure -M:lint` and
# `clojure -M:dev:test`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/kotoba-lang/ichiran }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/langchain, path: orgs/kotoba-lang/langchain }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/sheets, path: orgs/kotoba-lang/sheets }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/mailer, path: orgs/kotoba-lang/mailer }
      - uses: actions/checkout@v4
        with: { repository: kotoba-lang/mail, path: orgs/kotoba-lang/mail }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (propose-only contract · store parity · CACAO crypto)
        working-directory: orgs/kotoba-lang/ichiran
        run: clojure -M:dev:test
